[00. General Settings]

## Enables debug logging to the BepInEx console
# Setting type: Boolean
# Default value: false
Enable Debug Logging = false

## Global volume multiplier for all ambient battle sounds
# Setting type: Single
# Default value: 1
Global Ambient Volume Multiplier = 1

## Global cooldown multiplier for all ambient battle sounds
# Setting type: Single
# Default value: 1
Global Ambient Cooldown Multiplier = 1

## Use assigned weights when selecting random events
# Setting type: Boolean
# Default value: true
Use Event Weights = true

## Default rolloff distance for ambient battle sounds
# Setting type: Int32
# Default value: 1000
Ambient Rolloff Distance = 1000

## Occlusion test mode for ambient battle sounds. Use either ContinuousPropagated or Fast.
# Setting type: EOcclusionTest
# Default value: ContinuousPropagated
# Acceptable values: None, Fast, Regular, Continuous, ContinuousPropagated, Combined, OneShotPropagation, OneShotFullOcclusion
Occlusion Test Mode = ContinuousPropagated

## Audio source group for ambient battle sounds
# Setting type: AudioSourceGroupType
# Default value: Gunshots
# Acceptable values: Gunshots, Weaponry, Impacts, Character, Environment, Collisions, Speech, Distant, NonspatialBypass, Nonspatial, Voip, Grenades, Windows, VehicleInSpeech, Lamp, InteractiveObjects, OutEnvironment, PropagatedExclusive, LightOcclusion
Audio Source Group = Gunshots

## Debug keybind to immediately play battle ambience
# Setting type: KeyboardShortcut
# Default value: N
Play Ambient Shortcut = N

